<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bucks2Bar</title>

  <!-- Bootstrap 5 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />

  <style>
    :root {
      --brand: #1a7f5a;
      --brand-dark: #145f44;
    }

    body {
      background-color: #f4f6f8;
    }

    .navbar-brand {
      font-weight: 700;
      font-size: 1.4rem;
      letter-spacing: 0.03em;
    }

    .nav-tabs .nav-link.active {
      border-top: 3px solid var(--brand);
      color: var(--brand);
      font-weight: 600;
    }

    .nav-tabs .nav-link {
      color: #555;
    }

    /* Sticky header for the data table */
    #data-table thead th {
      position: sticky;
      top: 0;
      background: #fff;
      z-index: 1;
    }

    #data-table tfoot td {
      font-weight: 700;
      background: #f0f9f5;
    }

    .input-group-text {
      background-color: #e9ecef;
      font-weight: 600;
    }

    #barChart {
      max-height: 420px;
    }

    .stat-card .value {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .stat-card.income  .value { color: #198754; }
    .stat-card.expenses .value { color: #dc3545; }
    .stat-card.net     .value { color: var(--brand-dark); }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar" style="background-color: var(--brand);">
    <div class="container">
      <span class="navbar-brand text-white">Bucks2Bar</span>
      <span class="text-white-50 small">Income &amp; Expense Tracker</span>
    </div>
  </nav>

  <!-- Main content -->
  <div class="container my-4">

    <!-- Tab navigation -->
    <ul class="nav nav-tabs mb-3" id="mainTabs" role="tablist">
      <li class="nav-item" role="presentation">
        <button
          class="nav-link active"
          id="data-tab"
          data-bs-toggle="tab"
          data-bs-target="#data-pane"
          type="button"
          role="tab"
          aria-controls="data-pane"
          aria-selected="true"
        >Data</button>
      </li>
      <li class="nav-item" role="presentation">
        <button
          class="nav-link"
          id="chart-tab"
          data-bs-toggle="tab"
          data-bs-target="#chart-pane"
          type="button"
          role="tab"
          aria-controls="chart-pane"
          aria-selected="false"
        >Chart</button>
      </li>
    </ul>

    <!-- Tab panes -->
    <div class="tab-content" id="mainTabContent">

      <!-- ── DATA TAB ─────────────────────────────────────── -->
      <div
        class="tab-pane fade show active"
        id="data-pane"
        role="tabpanel"
        aria-labelledby="data-tab"
      >
        <div class="card shadow-sm">
          <div class="card-body p-0">
            <div class="table-responsive" style="max-height: 72vh;">
              <table class="table table-hover align-middle mb-0" id="data-table">
                <thead class="table-light">
                  <tr>
                    <th style="width: 120px;">Month</th>
                    <th>Income</th>
                    <th>Expenses</th>
                  </tr>
                </thead>
                <tbody id="data-tbody">
                  <!-- Rows injected by script.js -->
                </tbody>
                <tfoot>
                  <tr>
                    <td>Totals</td>
                    <td id="total-income">£0.00</td>
                    <td id="total-expenses">£0.00</td>
                  </tr>
                </tfoot>
              </table>
            </div>
          </div>
        </div>
      </div><!-- /data-pane -->

      <!-- ── CHART TAB ────────────────────────────────────── -->
      <div
        class="tab-pane fade"
        id="chart-pane"
        role="tabpanel"
        aria-labelledby="chart-tab"
      >
        <!-- Summary stat cards -->
        <div class="row g-3 mb-4">
          <div class="col-12 col-sm-4">
            <div class="card shadow-sm stat-card income h-100">
              <div class="card-body text-center">
                <div class="text-muted small mb-1">Total Income</div>
                <div class="value" id="stat-income">£0.00</div>
              </div>
            </div>
          </div>
          <div class="col-12 col-sm-4">
            <div class="card shadow-sm stat-card expenses h-100">
              <div class="card-body text-center">
                <div class="text-muted small mb-1">Total Expenses</div>
                <div class="value" id="stat-expenses">£0.00</div>
              </div>
            </div>
          </div>
          <div class="col-12 col-sm-4">
            <div class="card shadow-sm stat-card net h-100">
              <div class="card-body text-center">
                <div class="text-muted small mb-1">Net</div>
                <div class="value" id="stat-net">£0.00</div>
              </div>
            </div>
          </div>
        </div>

        <!-- Bar chart -->
        <div class="d-flex justify-content-end mb-2">
          <button
            id="downloadChartBtn"
            class="btn btn-sm"
            style="background-color: var(--brand); color: #fff;"
            onclick="downloadBarChart()"
          >&#8681; Download PNG</button>
        </div>
        <div class="card shadow-sm">
          <div class="card-body">
            <canvas id="barChart"></canvas>
          </div>
        </div>
      </div><!-- /chart-pane -->

    </div><!-- /tab-content -->
  </div><!-- /container -->

  <!-- Bootstrap 5 JS bundle -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"
  ></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <script src="script.js"></script>
</body>
</html>
